apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: provision-load-balancers
  namespace: argocd
  labels:
    app.kubernetes.io/name: load-balancer-provisioner
    app.kubernetes.io/component: provisioning
    app.kubernetes.io/part-of: platform-infrastructure
    platform.dev/layer: infrastructure
    platform.dev/category: networking
    platform.dev/provider: cloudflare
    platform.dev/tool: crossplane
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  generators:
    - git:
        repoURL: https://github.com/juanroldan1989/platform.git
        revision: main
        directories:
          - path: registry/load_balancers/overlays/*
  template:
    metadata:
      name: provision-load-balancer-{{path.basename}}
      labels:
        app.kubernetes.io/name: load-balancer
        app.kubernetes.io/component: provisioning
        app.kubernetes.io/part-of: platform-infrastructure
        platform.dev/layer: infrastructure
        platform.dev/category: networking
        platform.dev/app: "{{path.basename}}"
      annotations:
        argocd.argoproj.io/description: "Provision load balancer for {{path.basename}} via Cloudflare"
    spec:
      project: load-balancers
      sources:
        - repoURL: https://github.com/juanroldan1989/platform.git
          targetRevision: main
          path: registry/load_balancers/provision
          helm:
            valueFiles:
              - $values/registry/load_balancers/overlays/{{path.basename}}/values.yaml
        - repoURL: https://github.com/juanroldan1989/platform
          targetRevision: main
          ref: values
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
