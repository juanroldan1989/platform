apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "45"
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            workload: "true"
  template:
    metadata:
      name: observability-bootstrap-{{name}}
      annotations:
        argocd.argoproj.io/description: "Bootstrap observability namespace and shared platform metadata in {{name}} cluster"
    spec:
      project: default
      source:
        repoURL: https://github.com/juanroldan1989/platform.git
        targetRevision: main
        path: registry/clusters/workload/config/observability
      destination:
        name: "{{name}}"
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
