apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 0-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/juanroldan1989/platform.git
    targetRevision: main
    path: argo/0-platform
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
