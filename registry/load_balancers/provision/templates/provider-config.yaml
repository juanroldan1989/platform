apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: "{{ .Values.name }}"
spec:
  configuration: |
    terraform {
      backend "kubernetes" {
        secret_suffix     = "providerconfig-{{ .Values.name }}"
        namespace         = "crossplane-system"
        in_cluster_config = true
      }

      required_providers {
        cloudflare = {
          source = "..."
          version = "..."
        }
      }
    }

    provider "cloudflare" {
      api_key = var.cloudflare_api_key
    }
  credentials:
    - filename: gen-nothing
      source: Secret
      secretRef:
        namespace: crossplane-system # TODO: do I need to also setup this secret in this namespace?
        name: cloudflare-api-token
        key: cloudflare-api-token
