fullnameOverride: observability-gpu-metrics
namespaceOverride: observability
runtimeClassName: nvidia

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  additionalLabels:
    app.kubernetes.io/part-of: platform
    platform.automatalife.com/layer: observability

service:
  enable: true
  type: ClusterIP
  port: 9400

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

customMetrics: |
  # Format:
  # DCGM FIELD, Prometheus metric type, help message
  #
  # This list intentionally excludes DCGM_FI_PROF_* profiling metrics.
  # Some GPU nodes can initialize DCGM successfully but fail when watching
  # profiling fields, which prevents dcgm-exporter from becoming healthy.

  # Clocks
  DCGM_FI_DEV_SM_CLOCK,  gauge, SM clock frequency in MHz.
  DCGM_FI_DEV_MEM_CLOCK, gauge, Memory clock frequency in MHz.

  # Temperature
  DCGM_FI_DEV_GPU_TEMP, gauge, GPU temperature in C.

  # Power
  DCGM_FI_DEV_POWER_USAGE,              gauge, Power draw in W.
  DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION, counter, Total energy consumption since boot in mJ.

  # PCIe
  DCGM_FI_DEV_PCIE_REPLAY_COUNTER, counter, Total number of PCIe retries.

  # Utilization
  DCGM_FI_DEV_GPU_UTIL,      gauge, GPU utilization in percent.
  DCGM_FI_DEV_MEM_COPY_UTIL, gauge, Memory utilization in percent.

  # Memory usage
  DCGM_FI_DEV_FB_FREE, gauge, Framebuffer memory free in MiB.
  DCGM_FI_DEV_FB_USED, gauge, Framebuffer memory used in MiB.

  # Errors
  DCGM_FI_DEV_XID_ERRORS, gauge, Value of the last XID error encountered.

kubernetes:
  enablePodLabels: true
  enablePodUID: true
  podLabelAllowlistRegex:
    - "^app$"
    - "^app\\.kubernetes\\.io/.*"
    - "^observability/enabled$"
  rbac:
    create: true
