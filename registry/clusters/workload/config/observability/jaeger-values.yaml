fullnameOverride: observability-jaeger

commonLabels:
  app.kubernetes.io/part-of: platform
  platform.automatalife.com/layer: observability

jaeger:
  replicas: 1
  service:
    labels:
      app.kubernetes.io/part-of: platform
      platform.automatalife.com/layer: observability
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

userconfig:
  service:
    extensions:
      - jaeger_storage
      - jaeger_query
      - healthcheckv2
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - batch
        exporters:
          - jaeger_storage_exporter
    telemetry:
      metrics:
        level: detailed
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
  extensions:
    healthcheckv2:
      use_v2: true
      http:
        endpoint: 0.0.0.0:13133
    jaeger_query:
      storage:
        traces: primary_store
      ui:
        log_access: true
      grpc:
        endpoint: 0.0.0.0:16685
      http:
        endpoint: 0.0.0.0:16686
    jaeger_storage:
      backends:
        primary_store:
          memory:
            max_traces: 50000
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
  exporters:
    jaeger_storage_exporter:
      trace_storage: primary_store

extraObjects:
  - apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: observability-jaeger
      namespace: observability
      labels:
        app.kubernetes.io/name: observability-jaeger
        app.kubernetes.io/part-of: platform
        platform.automatalife.com/layer: observability
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/instance: observability-jaeger
      endpoints:
        - port: internal-metrics
          interval: 30s
