# London Cluster Configuration

## Kubernetes cluster configuration for London cluster
cloud_provider:
  civo:
    enabled: true # creates/deletes the cluster via GitOps

global:
  name: london
  region: lon1
  k8s_version: 1.35.0-k3s1
  storage_class: civo-volume
  node_count: "0"
  node_type: g4s.kube.large
  gpu_node_count: "1"
  gpu_node_type: g4g.kube.small # Contains 1 GPU & 12 CPU Cores

## DNS Configuration for External DNS
txtOwnerId: london
domainFilters:
  - automatalife.com

## Cert Manager Configuration
# This section defines the wildcard certificate for London cluster.
# A wildcard certificate will be created for all namespaces listed under `namespaces`.
cert_manager:
  wildcard:
    enabled: true
    namespaces:
      - cert-manager
      - hello-london
      - blog-db
